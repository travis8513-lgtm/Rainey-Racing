<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14101f">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pit Book">
<meta name="description" content="Rainey Racing pit book — shopping list, checklists, maintenance, setup & troubleshooting.">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<title>Rainey Racing — Pit Book</title>
<style>
  :root{
    --bg:#14101f; --card:#1f1830; --card2:#271e3d; --line:#3a2f56;
    --text:#f3eeff; --muted:#a99cc7; --yellow:#ffc400; --purple:#8a5cd6;
    --purpleB:#a46bff; --blue:#5aa0ff; --green:#37c871; --red:#ff6b6b;
    --safe-b: env(safe-area-inset-bottom); --safe-t: env(safe-area-inset-top);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none; -webkit-text-size-adjust:100%;}
  body{padding-bottom:calc(74px + var(--safe-b));}
  button,.tab,.row,.acc-head{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

  /* Header */
  header{position:sticky; top:0; z-index:20; background:linear-gradient(180deg,#1c1430,#171021);
    border-bottom:2px solid var(--yellow); padding:calc(10px + var(--safe-t)) 14px 10px;}
  .hwrap{display:flex; align-items:center; gap:10px; max-width:720px; margin:0 auto;}
  .badge{width:38px; height:38px; border-radius:9px; flex:0 0 auto;
    background:conic-gradient(#000 0 25%,#fff 0 50%,#000 0 75%,#fff 0 100%);
    background-size:12px 12px; border:2px solid var(--yellow);}
  .htxt{flex:1 1 auto; min-width:0;}
  .htxt h1{font-size:17px; margin:0; line-height:1.1; letter-spacing:.3px;}
  .htxt h1 .y{color:var(--yellow);} .htxt h1 .p{color:var(--purpleB);}
  .htxt p{margin:2px 0 0; font-size:11.5px; color:var(--muted);}
  .bookbtn{flex:0 0 auto; text-decoration:none; color:#14101f; background:var(--yellow);
    font-weight:800; font-size:12px; padding:8px 11px; border-radius:9px; white-space:nowrap;}

  main{max-width:720px; margin:0 auto; padding:12px 12px 20px;}
  .tabtitle{display:flex; align-items:baseline; justify-content:space-between; margin:2px 2px 10px;}
  .tabtitle h2{font-size:20px; margin:0;}
  .tabtitle span{font-size:12px; color:var(--muted);}

  /* Accordions */
  .acc{background:var(--card); border:1px solid var(--line); border-radius:14px;
    margin:0 0 10px; overflow:hidden;}
  .acc-head{display:flex; align-items:center; gap:10px; padding:14px 14px; cursor:pointer;}
  .acc-head .t{flex:1 1 auto; font-weight:700; font-size:15.5px; line-height:1.2;}
  .acc-head .cnt{font-size:12px; color:var(--muted); background:var(--card2);
    border:1px solid var(--line); padding:3px 8px; border-radius:20px; white-space:nowrap;}
  .acc-head .chev{color:var(--muted); transition:transform .18s ease; font-size:13px;}
  .acc.open .chev{transform:rotate(90deg);}
  .acc-body{display:none; padding:2px 8px 10px;}
  .acc.open .acc-body{display:block;}

  /* Rows */
  .row{display:flex; align-items:flex-start; gap:12px; padding:12px 8px; min-height:48px;
    border-top:1px solid var(--line); cursor:pointer;}
  .row:first-child{border-top:none;}
  .box{flex:0 0 auto; width:26px; height:26px; margin-top:1px; border-radius:7px;
    border:2px solid var(--purple); background:transparent; position:relative;}
  .box::after{content:"✓"; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:17px; font-weight:900; color:#0d1a10; opacity:0;}
  .row.on .box{background:var(--green); border-color:var(--green);}
  .row.on .box::after{opacity:1;}
  .row .lbl{flex:1 1 auto; font-size:15px; line-height:1.35; padding-top:1px; display:flex; flex-direction:column; align-items:flex-start;}
  .row.on .lbl>span:first-child{color:var(--muted); text-decoration:line-through;}
  .pn{margin-top:4px; font-size:11px; color:var(--muted); background:var(--card2); border:1px solid var(--line);
    border-radius:6px; padding:2px 7px; font-variant-numeric:tabular-nums; letter-spacing:.2px;}
  .buy{flex:0 0 auto; align-self:center; text-decoration:none; background:var(--purpleB); color:#fff;
    font-weight:800; font-size:12px; padding:9px 12px; border-radius:10px; white-space:nowrap;}
  .buy:active{filter:brightness(.9);}
  .vendor{background:var(--card); border:1px solid var(--purple); border-radius:14px; padding:12px 14px; margin:0 0 12px;}
  .vendor-h{font-weight:800; color:var(--yellow); font-size:14px; margin-bottom:6px;}
  .vendor-link{display:inline-block; color:var(--purpleB); font-weight:800; text-decoration:none; font-size:15px;}
  .vendor-note{font-size:12px; color:var(--muted); margin-top:7px;} .vendor-note b{color:var(--text);}
  .row .del{flex:0 0 auto; color:var(--muted); font-size:20px; padding:0 4px; line-height:1;}

  /* Reference rows (no checkbox) */
  .rrow{display:flex; gap:10px; padding:10px 8px; border-top:1px solid var(--line); font-size:14.5px; line-height:1.4;}
  .rrow:first-child{border-top:none;}
  .rrow .dot{color:var(--yellow); flex:0 0 auto; font-weight:900;}
  .rrow b{color:var(--yellow); font-weight:700;}

  .listtools{display:flex; justify-content:flex-end; padding:6px 8px 2px;}
  .reset{background:transparent; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:7px 12px; border-radius:9px;}
  .reset:active{background:var(--card2);}

  /* Add-your-own */
  .adder{display:flex; gap:8px; padding:10px 8px 4px;}
  .adder input{flex:1 1 auto; font-size:16px; padding:11px 12px; border-radius:10px;
    border:1px solid var(--line); background:#160f26; color:var(--text);}
  .adder button{flex:0 0 auto; background:var(--purpleB); color:#fff; border:none; font-weight:800;
    font-size:15px; padding:0 16px; border-radius:10px;}

  .note{background:var(--card2); border:1px dashed var(--line); border-radius:12px;
    padding:11px 13px; font-size:13px; color:var(--muted); margin:0 0 12px; line-height:1.45;}
  .note b{color:var(--yellow);}

  /* Home-screen tip */
  #hint{position:fixed; left:10px; right:10px; bottom:calc(80px + var(--safe-b)); z-index:30;
    background:#241a3a; border:1px solid var(--purple); border-radius:14px; padding:12px 14px;
    font-size:13px; color:var(--text); box-shadow:0 8px 30px #0009; display:none; line-height:1.4;}
  #hint b{color:var(--yellow);}
  #hint .x{position:absolute; top:6px; right:10px; color:var(--muted); font-size:20px; padding:4px;}

  /* Bottom tab bar */
  nav{position:fixed; left:0; right:0; bottom:0; z-index:25; background:#171021;
    border-top:1px solid var(--line); display:flex; padding-bottom:var(--safe-b);}
  .tab{flex:1 1 0; background:none; border:none; color:var(--muted); padding:9px 1px 8px; white-space:nowrap;
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:700;}
  .tab .ic{font-size:19px; line-height:1;}
  .tab.active{color:var(--yellow);}
  .tab.active .ic{transform:translateY(-1px);}

  /* Lap timer */
  .lt-best{text-align:center; font-size:13px; color:var(--muted); margin:0 0 10px;}
  .lt-best b{color:var(--yellow);}
  .lt-sel{display:flex; align-items:center; gap:6px; margin:0 0 12px; flex-wrap:wrap;}
  .chip{background:var(--card2); border:1px solid var(--line); color:var(--muted); font-weight:800;
    font-size:14px; padding:8px 14px; border-radius:20px;}
  .chip.sm{font-size:12.5px; padding:7px 12px; font-weight:700;}
  .chip.on{background:var(--yellow); color:#14101f; border-color:var(--yellow);}
  .lt-gap{flex:1 1 auto;}
  .lt-face{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 14px 14px;
    text-align:center; margin:0 0 12px;}
  .lt-face.tap{border-color:var(--yellow);}
  .lt-lapno{font-size:12.5px; color:var(--purpleB); font-weight:800; letter-spacing:.5px; text-transform:uppercase;}
  .lt-time{font-size:62px; font-weight:800; line-height:1.04; margin:2px 0; color:var(--text);
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  .lt-total{font-size:13px; color:var(--muted);}
  .lt-delta{font-size:15px; font-weight:800; margin-top:5px; min-height:19px;}
  .lt-delta.good{color:var(--green);} .lt-delta.bad{color:var(--red);} .lt-delta.neu{color:var(--muted); font-weight:700;}
  @keyframes flgood{0%{background:#1e5c37;}100%{background:var(--card);}}
  @keyframes flbad{0%{background:#5c1e2a;}100%{background:var(--card);}}
  .lt-face.good{animation:flgood 1s ease-out 1;}
  .lt-face.bad{animation:flbad 1s ease-out 1;}
  .lt-track{display:flex; align-items:center; gap:8px; margin:0 0 12px; font-size:15px; color:var(--muted);}
  .lt-track input{flex:1 1 auto; font-size:16px; padding:9px 11px; border-radius:10px; border:1px solid var(--line); background:#160f26; color:var(--text);}
  .lt-notes{width:100%; font-size:16px; padding:11px 12px; border-radius:10px; border:1px solid var(--line); background:#160f26; color:var(--text); margin:0 0 10px; font-family:inherit;}
  .lt-sess-note{font-size:12.5px; color:var(--text); font-style:italic; margin-top:3px;}
  .lt-big{width:100%; border:none; border-radius:16px; font-size:26px; font-weight:900; padding:22px 0; margin:0 0 10px; color:#14101f;}
  .lt-big.start{background:var(--green);}
  .lt-big.lap{background:var(--yellow);}
  .lt-big:active{filter:brightness(.92);}
  .lt-ctrls{display:flex; gap:10px; margin:0 0 12px;}
  .lt-btn{flex:1 1 0; background:var(--card2); border:1px solid var(--line); color:var(--text);
    font-weight:800; font-size:16px; padding:15px 0; border-radius:12px;}
  .lt-btn.stop{background:#3a1620; border-color:#7a2a3a; color:#ff9aa8;}
  .lt-btn.save{background:var(--green); color:#0d1a10; border:none;}
  .lt-stats{display:flex; gap:8px; margin:0 0 10px;}
  .lt-stat{flex:1 1 0; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:9px 4px; text-align:center;}
  .lt-stat .k{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .lt-stat .v{font-size:20px; font-weight:800; font-variant-numeric:tabular-nums;}
  .v.good,.good{color:var(--green);}
  .lt-laps{margin:0 0 12px;}
  .lt-lap{display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line);
    border-radius:10px; margin:0 0 6px; background:var(--card);}
  .lt-lap.best{border-color:var(--green); background:#14261a;}
  .lt-lap .n{color:var(--muted); font-weight:800; width:38px;}
  .lt-lap .t{flex:1 1 auto; font-size:19px; font-weight:800; font-variant-numeric:tabular-nums;}
  .lt-lap .d{font-size:12px; color:var(--muted);}
  .lt-lap.best .d{color:var(--green); font-weight:800;}
  .lt-sess{padding:10px 8px; border-top:1px solid var(--line);}
  .lt-sess:first-child{border-top:none;}
  .lt-sess-h{font-size:14px;} .lt-sess-h b{color:var(--text);}
  .lt-sess-x{float:right; color:var(--muted); font-size:20px; padding:0 6px; margin-top:-2px;}
  .lt-sess-s{font-size:12.5px; color:var(--muted); margin-top:3px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="badge" aria-hidden="true"></div>
    <div class="htxt">
      <h1><span class="y">RAINEY</span> <span class="p">RACING</span> · Pit Book</h1>
      <p>#10X · #3 &nbsp;•&nbsp; Camden Speedway · dirt clone / Predator</p>
    </div>
    <a class="bookbtn" href="setup-book.pdf" target="_blank" rel="noopener">📄 Book</a>
  </div>
</header>

<main id="main"></main>

<div id="hint">
  <span class="x" onclick="dismissHint()">×</span>
  <b>Make it an app:</b> tap the <b>Share</b> button in Safari, then <b>“Add to Home Screen.”</b>
  It opens full-screen and remembers everything you check.
</div>

<nav id="nav">
  <button class="tab active" data-tab="shop"><span class="ic">🛒</span>Shop</button>
  <button class="tab" data-tab="checks"><span class="ic">✅</span>Checks</button>
  <button class="tab" data-tab="maint"><span class="ic">🔧</span>Maint</button>
  <button class="tab" data-tab="laps"><span class="ic">⏱️</span>Laps</button>
  <button class="tab" data-tab="setup"><span class="ic">🏁</span>Setup</button>
  <button class="tab" data-tab="fix"><span class="ic">🩺</span>Fix</button>
</nav>

        "Rear width — narrow the rear (test)",
      ]],
      ["feedback","🗣️ Driver Feedback Words",[
        "\"Won't turn in the middle\" — tight / push → use TIGHT fixes",
        "\"Rear steps out\" — loose → use LOOSE fixes",
        "\"No drive off the corner\" — won't hook up → pressures / axle / gear",
        "\"Inside rear lifts / bicycles\" — check wedge & stagger",
        "\"Fast but on edge\" — maybe too free → calm it a touch",
      ]],
      ["baseline","📝 Log Your Baseline (write these down)",[
        "Rear stagger / front stagger",
        "Cold pressures LF / RF / LR / RR",
        "Left-side % / crossweight %",
        "Seat position; rear & front width",
        "Caster / camber / toe; axle & hubs",
        "Gear (driver / axle) + straightaway RPM",
        "Clutch + engagement RPM",
      ]],
    ],
  },
  fix: {
    title:"Fix-It / Troubleshooting", hint:"Work top to bottom — most common cause first.",
    lists:[
      ["nostart","🔌 Won't Start / Hard to Start",[
        "Fuel — in tank? valve on? fresh? filter clear? bowl has fuel?",
        "Spark — kill switch on & working? plug wire on? spark at the plug?",
        "Plug — fouled / wet? swap the pre-gapped spare",
        "Choke — set right for cold vs warm",
        "Air — filter not packed with mud",
        "Slow weak pull, no pop — check valve lash / deeper issue",
      ]],
      ["runsbad","💨 Runs but Bogs / Won't Rev",[
        "Bogs off the corner — clutch engagement high, gear too tall, or lean",
        "Black smoke / fouls — too rich; check choke & over-oiled filter",
        "Surges / lean & hot — fuel starvation; check flow, filter, vent",
        "Sputters after dust — dirt in the carb; clean the bowl, check filter seal",
        "Dies at idle — idle / clutch drag or fuel",
      ]],
      ["overheat","🔥 Overheating / Down on Power",[
        "Clean the cooling fins & shroud (mud cooks it)",
        "Oil level right, not overfilled; oil fresh",
        "Not running lean (lean = hot) — read the plug",
        "Clutch not slipping / dragging",
      ]],
      ["chain","⛓️ Chain Problems",[
        "Came off — tension, alignment, worn sprockets; replace a stretched chain",
        "Broke — fresh loop + NEW master link (clip forward); check sprockets",
        "Master link keeps failing — clip backwards or reused; always a new link",
        "Plate + chain loose — re-torque plate bolts + thread-locker + paint-mark",
      ]],
      ["clutch","⚙️ Clutch Problems",[
        "Slips / blue drum — glazed or worn shoes; service or replace",
        "Won't drive off idle — engagement too high or worn",
        "Drags / creeps at idle — engagement low or over-greased",
      ]],
      ["handling","🎯 Handling Problems",[
        "Won't turn (tight) — add stagger, take out wedge, free the rear",
        "Spins (loose) — reduce stagger, add wedge, add rear grip",
        "No forward bite — lower pressures, softer axle / longer hubs, check gear",
      ]],
      ["noise","🔊 Vibration / Strange Noise — STOP",[
        "New vibration — loose motor mount, bent axle, wheel / hub, clutch. Don't keep running it.",
        "Grinding — a bearing (axle or wheel). Squeal — brake or clutch.",
        "Can't find it fast? Sit the session out. A cheap part now beats a big repair.",
      ]],
    ],
  },
};

/* ---------------- STATE ---------------- */
const KEY="rr_pit_v1";
let ST = load();
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}} }
function save(){ try{localStorage.setItem(KEY, JSON.stringify(ST))}catch(e){} }
ST.checked = ST.checked||{};
ST.custom  = ST.custom||[];

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function itText(it){ return (typeof it==="string")? it : it.t; }
function refFmt(s){ const i=s.indexOf(" — "); if(i<0) return esc(s);
  return "<b>"+esc(s.slice(0,i))+"</b> "+esc(s.slice(i+3)); }

/* ---------------- RENDER ---------------- */
let CUR="shop";
function render(){
  if(CUR==="laps"){ renderLaps(true); return; }
  const main=document.getElementById("main");
  const isRef = REF[CUR]!==undefined;
  const grp = isRef?REF[CUR]:CHECK[CUR];
  let h=`<div class="tabtitle"><h2>${esc(grp.title)}</h2></div>`;
  h+=`<div class="note">${esc(grp.hint)}</div>`;
  if(CUR==="shop"){
    h+=`<div class="vendor"><div class="vendor-h">📍 Where we buy</div>`+
       `<a class="vendor-link" href="https://www.bmikarts.com" target="_blank" rel="noopener">BMI Karts &amp; Parts — bmikarts.com ↗</a>`+
       `<div class="vendor-note">Tap <b>🛒 Buy</b> on a part below to jump straight to it on BMI.</div></div>`;
  }
  grp.lists.forEach((L,idx)=>{
    const [lid,ttl,items]=L;
    const openCls = idx===0?" open":"";
    if(isRef){
      h+=`<div class="acc${openCls}"><div class="acc-head" onclick="toggleAcc(this)">
        <div class="t">${esc(ttl)}</div><div class="chev">▶</div></div>
        <div class="acc-body">`;
      items.forEach(it=>{ h+=`<div class="rrow"><span class="dot">•</span><span>${refFmt(it)}</span></div>`; });
      h+=`</div></div>`;
    }else{
      const total=items.length;
      let done=items.filter(it=>ST.checked[lid+"::"+itText(it)]).length;
      h+=`<div class="acc${openCls}"><div class="acc-head" onclick="toggleAcc(this)">
        <div class="t">${esc(ttl)}</div><div class="cnt" id="cnt-${lid}">${done}/${total}</div><div class="chev">▶</div></div>
        <div class="acc-body">`;
      items.forEach(it=>{
        const text=itText(it), k=lid+"::"+text, on=ST.checked[k]?" on":"";
        let inner=`<div class="box"></div><div class="lbl"><span>${esc(text)}</span>`;
        if(typeof it!=="string" && it.pn) inner+=`<span class="pn">Part&nbsp;# ${esc(it.pn)}</span>`;
        inner+=`</div>`;
        if(typeof it!=="string" && it.url) inner+=`<a class="buy" href="${esc(it.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🛒 Buy</a>`;
        h+=`<div class="row${on}" onclick="toggle('${lid}',this)" data-item="${esc(text)}">${inner}</div>`;
      });
      h+=`<div class="listtools"><button class="reset" onclick="resetList('${lid}',event)">Reset ${esc(ttl.replace(/^[^ ]+ /,''))}</button></div>`;
      h+=`</div></div>`;
    }
  });
  if(CUR==="shop"){
    h+=`<div class="acc open"><div class="acc-head" onclick="toggleAcc(this)">`+
       `<div class="t">➕ My Extra Items</div><div class="cnt">${ST.custom.length}</div><div class="chev">▶</div></div>`+
       `<div class="acc-body">`;
    ST.custom.forEach((it,ci)=>{
      const on=ST.checked["custom::"+it]?" on":"";
      h+=`<div class="row${on}" onclick="toggleCustom(${ci})"><div class="box"></div>`+
         `<div class="lbl"><span>${esc(it)}</span></div>`+
         `<div class="del" onclick="event.stopPropagation();delCustom(${ci})">×</div></div>`;
    });
    h+=`<div class="adder"><input id="addbox" placeholder="Add your own item…" enterkeyhint="done" onkeydown="if(event.key==='Enter'){addCustom();}"><button onclick="addCustom()">Add</button></div>`;
    h+=`</div></div>`;
  }
  main.innerHTML=h;
  window.scrollTo(0,0);
}

function toggleAcc(head){ head.parentNode.classList.toggle("open"); }

function toggle(lid,rowEl){
  const it=rowEl.getAttribute("data-item"); const k=lid+"::"+it;
  if(ST.checked[k]){ delete ST.checked[k]; rowEl.classList.remove("on"); }
  else { ST.checked[k]=1; rowEl.classList.add("on"); }
  save(); updateCount(lid);
}
function toggleCustom(ci){
  const it=ST.custom[ci]; if(it===undefined) return;
  const k="custom::"+it;
  if(ST.checked[k]) delete ST.checked[k]; else ST.checked[k]=1;
  save(); render();
}
function updateCount(lid){
  const grp=CHECK[CUR]; if(!grp) return;
  const L=grp.lists.find(x=>x[0]===lid); if(!L) return;
  const done=L[2].filter(it=>ST.checked[lid+"::"+itText(it)]).length;
  const el=document.getElementById("cnt-"+lid); if(el) el.textContent=done+"/"+L[2].length;
}
function resetList(lid,ev){
  ev.stopPropagation();
  Object.keys(ST.checked).forEach(k=>{ if(k.indexOf(lid+"::")===0) delete ST.checked[k]; });
  save(); render();
}
function addCustom(){
  const inp=document.getElementById("addbox"); if(!inp) return;
  const v=inp.value.trim(); if(!v) return;
  if(ST.custom.indexOf(v)<0) ST.custom.push(v);
  save(); render();
  // reopen shop first? keep it simple: re-render keeps first open; focus add box
  setTimeout(()=>{ const b=document.getElementById("addbox"); if(b){b.focus();} },30);
}
function delCustom(i){
  const it=ST.custom[i]; if(it!==undefined){ delete ST.checked["custom::"+it]; ST.custom.splice(i,1); }
  save(); render();
}

/* tabs */
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active"); CUR=t.getAttribute("data-tab"); render();
  });
});

/* home-screen hint (iOS Safari, once) */
function dismissHint(){ ST.hint=1; save(); document.getElementById("hint").style.display="none"; }
(function maybeHint(){
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.navigator.standalone===true;
  if(isiOS && !standalone && !ST.hint){
    setTimeout(()=>{ document.getElementById("hint").style.display="block"; },900);
  }
})();

/* ---------------- LAP TIMER ---------------- */
const LKEY="rr_laps_v1";
let LS = loadLaps();
function loadLaps(){ try{return JSON.parse(localStorage.getItem(LKEY))||{sessions:[]}}catch(e){return {sessions:[]}} }
function saveLS(){ try{localStorage.setItem(LKEY, JSON.stringify(LS))}catch(e){} }
LS.sessions = LS.sessions||[];

let LT={running:false, stopped:false, t0:0, lapStart:0, laps:[], driver:"10X", label:"Practice", track:(LS.lastTrack||"Camden"), notes:"", flash:null};

function fmt(ms){
  const s=ms/1000;
  if(s<60) return s.toFixed(2);
  const m=Math.floor(s/60), r=s-m*60;
  return m+":"+(r<10?"0":"")+r.toFixed(2);
}
function bestEver(dv){
  let b=null;
  LS.sessions.forEach(x=>{ if(x.driver===dv && x.best!=null && (b==null||x.best<b)) b=x.best; });
  return b;
}
function ltTick(){
  if(!LT.running) return;
  const el=document.getElementById("lt-current");
  if(el){
    const now=performance.now();
    el.textContent=fmt(now-LT.lapStart);
    const tt=document.getElementById("lt-total"); if(tt) tt.textContent="Total "+fmt(now-LT.t0);
  }
  requestAnimationFrame(ltTick);
}
function ltStart(){ LT.running=true; LT.stopped=false; LT.laps=[]; LT.flash=null; LT.notes=""; LT.t0=LT.lapStart=performance.now(); renderLaps(); requestAnimationFrame(ltTick); }
function ltLap(){
  if(!LT.running) return;
  const now=performance.now(), lap=now-LT.lapStart;
  const prevBest = LT.laps.length? Math.min(...LT.laps) : null;
  LT.laps.push(lap); LT.lapStart=now;
  if(prevBest==null) LT.flash={type:"first", lap:lap, delta:0};
  else if(lap<=prevBest) LT.flash={type:"good", lap:lap, delta:lap-prevBest};
  else LT.flash={type:"bad", lap:lap, delta:lap-prevBest};
  renderLaps();
}
function ltStop(){ if(!LT.running) return; LT.running=false; LT.stopped=true; renderLaps(); }
function ltReset(){ LT.running=false; LT.stopped=false; LT.laps=[]; LT.flash=null; LT.notes=""; renderLaps(); }
function ltSave(){
  if(!LT.laps.length) return;
  const nel=document.getElementById("lt-notes"); const notes = nel? nel.value : (LT.notes||"");
  const best=Math.min(...LT.laps), avg=LT.laps.reduce((a,b)=>a+b,0)/LT.laps.length;
  const d=new Date();
  LS.lastTrack = LT.track||"";
  LS.sessions.unshift({id:Date.now(), date:(d.getMonth()+1)+"/"+d.getDate(), driver:LT.driver, label:LT.label, track:(LT.track||""), notes:notes, laps:LT.laps.slice(), best, avg});
  saveLS(); LT.notes=""; ltReset();
}
function ltDelete(id){ LS.sessions=LS.sessions.filter(s=>s.id!==id); saveLS(); renderLaps(); }
function ltDriver(dv){ LT.driver=dv; renderLaps(); }
function ltLabel(lb){ LT.label=lb; renderLaps(); }

function renderLaps(scroll){
  const main=document.getElementById("main");
  const be10=bestEver("10X"), be3=bestEver("3");
  let h=`<div class="tabtitle"><h2>Lap Timer</h2></div>`;
  h+=`<div class="note">Tap <b>LAP</b> each time the kart crosses the start/finish line. Your best lap is highlighted in green.</div>`;
  h+=`<div class="lt-best">🏆 Best #10X: <b>${be10!=null?fmt(be10):"—"}</b> &nbsp;•&nbsp; Best #3: <b>${be3!=null?fmt(be3):"—"}</b></div>`;
  h+=`<div class="lt-sel">`;
  ["10X","3"].forEach(dv=>{ h+=`<button class="chip${LT.driver===dv?" on":""}" onclick="ltDriver('${dv}')">#${dv}</button>`; });
  h+=`<span class="lt-gap"></span>`;
  ["Practice","Heat","Feature"].forEach(lb=>{ h+=`<button class="chip sm${LT.label===lb?" on":""}" onclick="ltLabel('${lb}')">${lb}</button>`; });
  h+=`</div>`;
  h+=`<div class="lt-track">📍 <input id="lt-trackin" value="${esc(LT.track||"")}" placeholder="Track (e.g. Camden)" oninput="LT.track=this.value" onchange="LS.lastTrack=this.value; saveLS();"></div>`;

  const cur = LT.running ? "0.00" : (LT.laps.length? fmt(LT.laps[LT.laps.length-1]) : "0.00");
  const sub = LT.running ? "Total 0.00" : (LT.laps.length? (LT.laps.length+" laps") : ("#"+LT.driver+" • "+LT.label));
  const lapno = LT.running ? ("Lap "+(LT.laps.length+1)) : (LT.stopped? "Stopped" : "Ready");
  const flashCls = (LT.running && LT.flash && LT.flash.type!=="first") ? (" "+LT.flash.type) : "";
  h+=`<div class="lt-face${LT.running?" tap":""}${flashCls}" onclick="if(LT.running)ltLap()">
        <div class="lt-lapno">${lapno}</div>
        <div class="lt-time" id="lt-current">${cur}</div>
        <div class="lt-total" id="lt-total">${sub}</div>`;
  if(LT.running && LT.flash){
    const f=LT.flash;
    if(f.type==="first") h+=`<div class="lt-delta neu">Last: ${fmt(f.lap)} · set the mark</div>`;
    else if(f.type==="good") h+=`<div class="lt-delta good">▼ ${fmt(f.lap)} — ${f.delta<0?("NEW BEST ("+(f.delta/1000).toFixed(2)+")"):"= best"}</div>`;
    else h+=`<div class="lt-delta bad">▲ ${fmt(f.lap)} — +${(f.delta/1000).toFixed(2)} off best</div>`;
  }
  h+=`</div>`;

  if(LT.running){
    h+=`<button class="lt-big lap" onclick="ltLap()">⏱ LAP</button>`;
    h+=`<div class="lt-ctrls"><button class="lt-btn stop" onclick="ltStop()">■ Stop</button></div>`;
  } else if(LT.stopped && LT.laps.length){
    h+=`<input class="lt-notes" id="lt-notes" placeholder="Notes (optional): added stagger, track slick…" value="${esc(LT.notes||"")}" oninput="LT.notes=this.value">`;
    h+=`<div class="lt-ctrls"><button class="lt-btn save" onclick="ltSave()">💾 Save Run</button><button class="lt-btn" onclick="ltReset()">↺ Clear</button></div>`;
  } else {
    h+=`<button class="lt-big start" onclick="ltStart()">▶ START</button>`;
  }

  if(LT.laps.length){
    const best=Math.min(...LT.laps), last=LT.laps[LT.laps.length-1], avg=LT.laps.reduce((a,b)=>a+b,0)/LT.laps.length;
    h+=`<div class="lt-stats">
      <div class="lt-stat"><div class="k">Best</div><div class="v good">${fmt(best)}</div></div>
      <div class="lt-stat"><div class="k">Last</div><div class="v">${fmt(last)}</div></div>
      <div class="lt-stat"><div class="k">Avg</div><div class="v">${fmt(avg)}</div></div></div>`;
    h+=`<div class="lt-laps">`;
    for(let i=LT.laps.length-1;i>=0;i--){
      const t=LT.laps[i], isb=(t===best);
      h+=`<div class="lt-lap${isb?" best":""}"><span class="n">L${i+1}</span><span class="t">${fmt(t)}</span>`+
         `<span class="d">${isb?"★ best":("+"+((t-best)/1000).toFixed(2))}</span></div>`;
    }
    h+=`</div>`;
  }

  if(LS.sessions.length){
    h+=`<div class="acc" ><div class="acc-head" onclick="toggleAcc(this)">
      <div class="t">💾 Saved Runs</div><div class="cnt">${LS.sessions.length}</div><div class="chev">▶</div></div><div class="acc-body">`;
    LS.sessions.forEach(s=>{
      h+=`<div class="lt-sess"><div class="lt-sess-h"><b>${esc(s.date)}</b> · #${esc(s.driver)} · ${esc(s.label)}${s.track?(" · "+esc(s.track)):""}
        <span class="lt-sess-x" onclick="ltDelete(${s.id})">×</span></div>
        <div class="lt-sess-s">Best <b class="good">${fmt(s.best)}</b> · Avg ${fmt(s.avg)} · ${s.laps.length} laps</div>`;
      if(s.notes) h+=`<div class="lt-sess-note">“${esc(s.notes)}”</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }
  main.innerHTML=h;
  if(scroll) window.scrollTo(0,0);
}

render();
</script>
</body>
</html>
